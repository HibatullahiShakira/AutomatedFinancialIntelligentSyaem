[tool.ruff]
line-length = 88
select = ["E", "F", "W", "C90"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.12"
plugins = []
ignore_missing_imports = true
strict = true

[tool.coverage.run]
branch = true
source = ["apps"]

[tool.pytest.ini_options]
minversion = "7.0"
addopts = "--strict-markers --disable-warnings -q"
testpaths = ["tests"]
