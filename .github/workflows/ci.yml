name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install linters
        run: pip install ruff==0.15.4 mypy==1.11.2 bandit==1.7.9
      - name: Run static checks
        run: |
          ruff check .
          mypy apps
          bandit -q -r apps

  infra-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Terraform
        uses: hashicorp/setup-terraform@v3
      - name: Terraform format check
        run: terraform -chdir=infrastructure fmt -check -recursive
      - name: Terraform validate
        run: |
          terraform -chdir=infrastructure init -backend=false
          terraform -chdir=infrastructure validate

  test:
    runs-on: ubuntu-latest
    needs: [lint, infra-check]
    services:
      postgres:
        image: postgres:15
        env:
          POSTGRES_USER: user
          POSTGRES_PASSWORD: password
          POSTGRES_DB: amss
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U user -d amss"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
      redis:
        image: redis:7
        ports:
          - 6379:6379
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install dependencies
        run: pip install -r requirements/local.txt
      - name: Apply database migrations
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DATABASE_URL: postgresql://user:password@localhost:5432/amss
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: python manage.py migrate --noinput
      - name: Run tests with coverage gate
        env:
          DJANGO_SETTINGS_MODULE: config.settings.local
          DATABASE_URL: postgresql://user:password@localhost:5432/amss
          REDIS_URL: redis://localhost:6379/0
          CELERY_BROKER_URL: redis://localhost:6379/1
          CELERY_RESULT_BACKEND: redis://localhost:6379/2
        run: pytest --maxfail=1 --disable-warnings --cov=apps --cov-report=term-missing --cov-fail-under=60 -q
