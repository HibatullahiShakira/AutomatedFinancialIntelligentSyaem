version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: amss
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d amss"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  localstack:
    image: localstack/localstack:3
    environment:
      SERVICES: s3,sqs,sagemaker
      DEBUG: "0"
    ports:
      - "4566:4566"

  smtp:
    image: mailhog/mailhog:latest
    ports:
      - "1025:1025"
      - "8025:8025"

  app:
    build:
      context: ..
      dockerfile: docker/Dockerfile.api
    command: python manage.py runserver 0.0.0.0:8000
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/amss
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ..:/code
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  celery:
    build:
      context: ..
      dockerfile: docker/Dockerfile.worker
    command: celery -A config worker --loglevel=info
    env_file:
      - ../.env.example
    environment:
      DATABASE_URL: postgresql://user:password@db:5432/amss
      REDIS_URL: redis://redis:6379/0
      CELERY_BROKER_URL: redis://redis:6379/1
      CELERY_RESULT_BACKEND: redis://redis:6379/2
    volumes:
      - ..:/code
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
